services:
  db:
    image: ${MO_DB_IMAGE}
    build:
      context: .
      dockerfile: Dockerfile.db
      args:
        SOCKS5_PROXY: ${SOCKS5_PROXY}
    container_name: memory-orchestrator-db
    hostname: memory-orchestrator-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${MO_DB_PASSWORD}
    ports:
      - "${MO_DB_PORT}:5432"
    command: >
      postgres
      -c shared_preload_libraries=age,vector
      -c search_path=ag_catalog,"$$user",public
    volumes:
      - ${MO_PGDATA}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: memory-orchestrator-server:latest
    container_name: memory-orchestrator-migrate
    build:
      context: ./memory_orchestrator_server
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${MO_BASE_IMAGE}
        TORCH_INDEX: ${TORCH_INDEX}
    command: >
      sh -c "cd /app/memory_orchestrator_server && alembic upgrade head"
    environment:
      MO_DB_DSN: ${MO_DB_DSN}
    depends_on:
      db:
        condition: service_healthy

  server:
    image: memory-orchestrator-server:latest
    container_name: memory-orchestrator-server
    hostname: memory-orchestrator-server
    build:
      context: ./memory_orchestrator_server
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${MO_BASE_IMAGE}
        TORCH_INDEX: ${TORCH_INDEX}
    ports:
      - "${MO_HTTP_PORT}:8765"
    environment:
      MO_DB_DSN: ${MO_DB_DSN}
      MO_HTTP_HOST: ${MO_HTTP_HOST}
      MO_HTTP_PORT: ${MO_HTTP_PORT}
      MO_EXTRACTION_BASE_URL: ${MO_EXTRACTION_BASE_URL}
      MO_EXTRACTION_MODEL: ${MO_EXTRACTION_MODEL}
      MO_EXTRACTION_API_KEY: ${MO_EXTRACTION_API_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${MO_HTTP_PORT}/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 45
      start_period: 30s
    restart: unless-stopped
